<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <title>WWF | 북극곰 보호 캠페인</title>
    <link rel="shortcut icon" href="./images/logo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/common.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/responsive.css">
</head>
<body>
    <div id="wrap">
        <!-- 1행 캠페인 표지-->
        <section class="container intro">
            <p class="logo"><img src="./images/logo.jpg" alt="wwf"></p>
            <h1><span>생존의 벼랑 끝에 서 있는</span><span>북극곰을 지켜주세요</span></h1>
            <a href="#" class="sponsor_btn"><em>북극곰 후원하기</em><!-- after --></a>
        </section>
        <!-- 2행 퀴즈-->
        <div class="container quiz_bg">
            <section class="contents quiz">
                <div class="quiz_list">
                    <h1>Quiz</h1>
                    <h2><span>20년 사이 북극 빙하 면적은 </span><span>몇 % 감소했을까요?</span></h2>
                    <form action="#" method="get" id="quiz_frm">
                        <ul>
                            <li>
                                <input type="radio" name="quiz_group" value="q30" id="q30">
                                <label for="q30">30%</label>
                            </li>
                            <li>
                                <input type="radio" name="quiz_group" value="q40" id="q40">
                                <label for="q40">40%</label>
                            </li>
                            <li>
                                <input type="radio" name="quiz_group" value="q50" id="q50">
                                <label for="q50">50%</label>
                            </li>
                            <li>
                                <input type="radio" name="quiz_group" value="q60" id="q60">
                                <label for="q60">60%</label>
                            </li>
                        </ul>
                        <button type="submit" id="answer_btn">정답 확인 하기</button>
                    </form>
                </div>
                <div class="quiz_status">
                    <img src="./images/quiz_contents.png" alt="퀴즈참여현황">
                    <p>*퀴즈 참여 현황은 매주 업데이트 됩니다</p>
                </div>
            </section>
        </div>
        <!-- 3행 영상-->

</body>
</html>
